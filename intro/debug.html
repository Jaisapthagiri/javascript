<!DOCTYPE html>
<html>

<head>
    <title>Debug Practice</title>
</head>

<body>

    <h2>Debugging Test</h2>

    <script>
        function calculateTotal(price, quantity, discount) {
            let total = price * quantity;

            if (discount) {
                total = total - discount * 100;
            }

            return total;
        }

        let result = calculateTotal(100, 2, 0.1);

        console.log("Final Total:", result);

        function test() {
            let x = 10;

            debugger;

            let y = x * 2;
            console.log(y);
        }

        test();


    </script>

</body>

</html>
